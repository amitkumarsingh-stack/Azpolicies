{
  "location": "${LOCATION}",
  "tags": { "environment": "poc", "team": "${NAME}" },
  "properties": {
    "dataCollectionEndpointId": "${DCE_ID}",
    "description": "DCR for team ${NAME} — only routes metrics with microsoft_metrics_include_label=${NAMESPACE}",
    "dataSources": {
      "prometheusForwarder": [
        {
          "name": "PrometheusDataSource-${NAME}",
          "streams": ["Microsoft-PrometheusMetrics"],
          "labelIncludeFilter": {
            "microsoft_metrics_include_label": "${NAMESPACE}"
          }
        }
      ]
    },
    "destinations": {
      "monitoringAccounts": [
        {
          "accountResourceId": "${AMW_ID}",
          "name": "MonitoringAccount-${NAME}"
        }
      ]
    },
    "dataFlows": [
      {
        "streams": ["Microsoft-PrometheusMetrics"],
        "destinations": ["MonitoringAccount-${NAME}"]
      }
    ]
  }
}
