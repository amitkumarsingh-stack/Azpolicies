apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-default-namespace
  annotations:
    # Human readable description of what this policy does
    policies.kyverno.io/title: "Block Default Namespace"
    
    # Category for grouping policies
    policies.kyverno.io/category: "Best Practices"
    
    # Severity level: low, medium, high, critical
    policies.kyverno.io/severity: "medium"
    
    # Which resources this policy targets
    policies.kyverno.io/subject: "Pod, Deployment, StatefulSet"
    
    # Detailed description
    policies.kyverno.io/description: >-
      Deploying resources in the default namespace is discouraged 
      as it makes it harder to manage access control, resource quotas,
      and network policies. This policy blocks all resource creation 
      in the default namespace and requires users to create dedicated 
      namespaces for their workloads.

    # Optional - link to more information
    policies.kyverno.io/minversion: "1.6.0"
    
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: block-deployments-default-namespace
    match:
      any:
      - resources:
          kinds:
          - Pod
          - Deployment
          - StatefulSet
          - DaemonSet
          - Job
          - CronJob
          - ReplicaSet
          - Service
          - ConfigMap
          - Secret
          namespaces:
          - default
    exclude:
      any:
      - clusterRoles:
        - cluster-admin
      - subjects:
        - kind: ServiceAccount
          name: system:serviceaccount:kube-system:*
    validate:
      message: "Deploying resources in the default namespace is not allowed. Please use a dedicated namespace."
      deny: {}

-----
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-workload-toleration
spec:
  rules:
  - name: add-toleration
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - my-apps
    mutate:
      patchStrategicMerge:
        spec:
          tolerations:
          - key: workload
            operator: Equal
            value: apps
            effect: NoSchedule
