# =============================================================================
# ingress-nginx Annotation Test Suite for NGINX Gateway Fabric Migration
# =============================================================================
# Usage:
#   kubectl apply -f ingress-annotation-test.yaml
#   Then run validate.sh to check which annotations worked
#
# Namespace: bookinfo (matches your current test setup)
# Each Ingress below isolates a specific annotation category.
# =============================================================================

---
# =============================================================================
# 1. BASELINE — no annotations (sanity check, must work)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-01-baseline
  namespace: bookinfo
  labels:
    test-category: baseline
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-01-baseline
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 2. SSL / TLS REDIRECT
# Expected NGF equivalent: HTTPRoute RequestRedirect filter
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-02-ssl-redirect
  namespace: bookinfo
  labels:
    test-category: ssl
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-02-ssl
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 3. REWRITE TARGET
# Expected NGF equivalent: HTTPRoute URLRewrite filter
# NOTE: Regex-based rewrites may NOT convert automatically
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-03-rewrite
  namespace: bookinfo
  labels:
    test-category: rewrite
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-03-rewrite(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 4. REQUEST HEADERS (proxy-set-headers / custom-headers)
# Expected NGF equivalent: HTTPRoute RequestHeaderModifier filter
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-04-request-headers
  namespace: bookinfo
  labels:
    test-category: headers
  annotations:
    nginx.ingress.kubernetes.io/custom-headers: "bookinfo/test-custom-headers"
    nginx.ingress.kubernetes.io/proxy-set-headers: "bookinfo/test-custom-headers"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-04-req-headers
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

# ConfigMap referenced by test-04
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-custom-headers
  namespace: bookinfo
data:
  X-Test-Header: "ngf-migration-test"
  X-Real-IP: "$remote_addr"
  X-Forwarded-For: "$proxy_add_x_forwarded_for"

---
# =============================================================================
# 5. RESPONSE HEADERS (add-headers / hide-headers)
# Expected NGF equivalent: HTTPRoute ResponseHeaderModifier filter
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-05-response-headers
  namespace: bookinfo
  labels:
    test-category: headers
  annotations:
    nginx.ingress.kubernetes.io/hide-headers: "X-Powered-By,Server"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-05-resp-headers
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 6. RATE LIMITING
# Expected NGF equivalent: RateLimitPolicy (NOT natively in Gateway API core)
# LIKELY UNSUPPORTED in NGF OSS — will show WARNING
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-06-rate-limit
  namespace: bookinfo
  labels:
    test-category: rate-limit
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-rpm: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "5"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-06-ratelimit
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 7. TIMEOUTS & PROXY SETTINGS
# Expected NGF equivalent: ClientSettingsPolicy or BackendLBPolicy
# Partial support — connect/read timeouts may not map 1:1
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-07-timeouts
  namespace: bookinfo
  labels:
    test-category: proxy-settings
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-07-timeouts
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 8. CORS
# Expected NGF equivalent: HTTPRoute CORSFilter (Gateway API v1.1+)
# Support varies — NGF may handle via ResponseHeaderModifier workaround
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-08-cors
  namespace: bookinfo
  labels:
    test-category: cors
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://traefikdemotest.azure.nl.eu.abnamro.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-ABN-CorrelationId"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "3600"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-08-cors
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 9. BACKEND PROTOCOL (gRPC / WebSocket / HTTPS)
# Expected NGF equivalent: native HTTPRoute / GRPCRoute
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-09-backend-protocol
  namespace: bookinfo
  labels:
    test-category: backend-protocol
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/websocket-services: "productpage"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-09-backend-proto
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 10. CANARY / TRAFFIC SPLITTING
# Expected NGF equivalent: HTTPRoute weights or header-based matches
# ingress2gateway converts this to HTTPRoute conditions — verify carefully
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-10-canary
  namespace: bookinfo
  labels:
    test-category: canary
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-header: "X-Canary"
    nginx.ingress.kubernetes.io/canary-by-header-value: "always"
    nginx.ingress.kubernetes.io/canary-weight: "20"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-10-canary
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 11. SESSION AFFINITY (sticky sessions)
# LIKELY UNSUPPORTED in NGF OSS — requires NGINX Plus
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-11-session-affinity
  namespace: bookinfo
  labels:
    test-category: session-affinity
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "ABNAMRO_SESSION"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-11-affinity
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 12. mTLS / CLIENT CERTIFICATE AUTH
# Expected NGF equivalent: BackendTLSPolicy / Gateway listener cert validation
# Manual migration required — no direct annotation equivalent
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-12-mtls
  namespace: bookinfo
  labels:
    test-category: mtls
  annotations:
    nginx.ingress.kubernetes.io/auth-tls-secret: "bookinfo/ca-secret"
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-12-mtls
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 13. EXTERNAL AUTH (auth-url)
# UNSUPPORTED in NGF OSS — requires SecurityPolicy (ExtAuth)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-13-ext-auth
  namespace: bookinfo
  labels:
    test-category: auth
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "https://auth-service.bookinfo.svc/validate"
    nginx.ingress.kubernetes.io/auth-method: "GET"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-User,X-Auth-Role"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-13-ext-auth
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 14. CONFIGURATION SNIPPET
# UNSUPPORTED / SECURITY RISK — will be rejected or ignored by NGF
# This is the #1 reason ingress-nginx was retired
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-14-snippet
  namespace: bookinfo
  labels:
    test-category: snippet
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Snippet-Header: test";
    nginx.ingress.kubernetes.io/server-snippet: |
      location /health { return 200 "ok"; }
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-14-snippet
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080

---
# =============================================================================
# 15. LOAD BALANCING ALGORITHM
# UNSUPPORTED in NGF OSS (Lua-based in ingress-nginx)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-15-load-balancing
  namespace: bookinfo
  labels:
    test-category: load-balancing
  annotations:
    nginx.ingress.kubernetes.io/load-balance: "ewma"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
spec:
  ingressClassName: nginx
  rules:
  - host: traefikdemotest.azure.nl.eu.abnamro.com
    http:
      paths:
      - path: /zz-test-15-lb
        pathType: Prefix
        backend:
          service:
            name: productpage
            port:
              number: 9080
