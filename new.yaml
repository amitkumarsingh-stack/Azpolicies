apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-namespace-defaults
  annotations:
    policies.kyverno.io/title: "Generate Namespace Defaults"
    policies.kyverno.io/category: "Multi-Tenancy"
    policies.kyverno.io/severity: "medium"
    policies.kyverno.io/subject: "Namespace"
    policies.kyverno.io/description: >-
      Automatically generates a ResourceQuota and a default
      CiliumNetworkPolicy for every new namespace created.
      This ensures all namespaces have resource limits and
      a baseline network policy enforced from creation.
    policies.kyverno.io/minversion: "1.6.0"
spec:
  rules:

  # Rule 1 - Generate ResourceQuota
  - name: generate-resource-quota
    match:
      resources:
        kinds:
        - Namespace
    generate:
      apiVersion: v1
      kind: ResourceQuota
      name: default-resource-quota
      # Generate in the newly created namespace
      namespace: "{{request.object.metadata.name}}"
      # synchronize: true means if policy changes, quota is updated too
      # synchronize: false means quota is only created once and can be modified manually
      synchronize: true
      data:
        metadata:
          name: default-resource-quota
          labels:
            managed-by: kyverno
            policy: generate-namespace-defaults
        spec:
          hard:
            # Maximum number of pods in namespace
            pods: "20"
            # Maximum number of services
            services: "10"
            # Maximum number of secrets
            secrets: "20"
            # Maximum number of configmaps
            configmaps: "20"
            # CPU requests total across all pods
            requests.cpu: "4"
            # Memory requests total across all pods
            requests.memory: "4Gi"
            # CPU limits total across all pods
            limits.cpu: "8"
            # Memory limits total across all pods
            limits.memory: "8Gi"
            # Maximum number of persistent volume claims
            persistentvolumeclaims: "5"

  # Rule 2 - Generate CiliumNetworkPolicy
  - name: generate-cilium-default-policy
    match:
      resources:
        kinds:
        - Namespace
        # Exclude system namespaces from getting this policy
        selector:
          matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
            - kube-system
            - kube-public
            - kube-node-lease
            - kyverno
            - monitoring
            - cert-manager
    generate:
      apiVersion: cilium.io/v2
      kind: CiliumNetworkPolicy
      name: default-namespace-policy
      namespace: "{{request.object.metadata.name}}"
      synchronize: true
      data:
        metadata:
          name: default-namespace-policy
          labels:
            managed-by: kyverno
            policy: generate-namespace-defaults
        spec:
          # Apply to all pods in the namespace
          endpointSelector: {}
          # Egress rules - what pods can connect TO
          egress:
          - toEntities:
            # Allow DNS resolution
            - cluster
            toPorts:
            - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
          - toEntities:
            # Allow calls to kube-apiserver
            - kube-apiserver
            toPorts:
            - ports:
              - port: "443"
                protocol: TCP
          - toEntities:
            # Allow internet egress on 443
            - world
            toPorts:
            - ports:
              - port: "443"
                protocol: TCP
          # Ingress rules - what can connect TO pods
          ingress:
          - fromEntities:
            # Allow traffic from within the same namespace
            - namespace
          - fromEntities:
            # Allow traffic from kube-apiserver (for webhooks)
            - kube-apiserver
            toPorts:
            - ports:
              - port: "9443"
                protocol: TCP
----
cat <<EOF | kubectl apply -f -
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-cilium-generate
  labels:
    app.kubernetes.io/instance: kyverno
spec:
  rules:
  - apiGroups:
    - cilium.io
    resources:
    - ciliumnetworkpolicies
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-cilium-generate
  labels:
    app.kubernetes.io/instance: kyverno
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-cilium-generate
subjects:
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
EOF
----
cat <<EOF | kubectl apply -f -
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-cilium-generate
  labels:
    app.kubernetes.io/instance: kyverno
rules:
- apiGroups:
  - cilium.io
  resources:
  - ciliumnetworkpolicies
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
EOF
