apiVersion: azmonitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kyverno-admission-controller
  namespace: kyverno
spec:
  endpoints:
  - port: metrics-port
    path: /metrics
    interval: 30s
  namespaceSelector:
    matchNames:
    - kyverno
  selector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/instance: kyverno
---
